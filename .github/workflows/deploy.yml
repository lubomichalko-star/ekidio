# Build + publish vetva deploy (GitHub-only workflow).
# Hosting si stiahne vetvu deploy do wp-content/plugins/ekidio (nastavíš raz v paneli).
#
# Pracovný postup:
#   1. Uprav kód na GitHube (web editor / Codespaces)
#   2. Push do main
#   3. Actions zbuildí plugin a aktualizuje vetvu deploy
#   4. Hosting automaticky spraví git pull (ak je zapnuté)

name: Build and publish deploy branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build plugin package
        run: |
          npm ci
          npm run build
          node scripts/prepare-plugin-deploy.mjs

      - name: Publish deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: deploy/plugin
          single-commit: true
          commit-message: Deploy from ${{ github.sha }}
