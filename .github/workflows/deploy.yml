# Deploy cez FTP – beží na self-hosted runner (tvoj PC).
# Hosting blokuje FTP z GitHub cloud IP → ubuntu-latest nefunguje.
#
# Možnosti:
#   A) npm run deploy:ftp  (najrýchlejšie, z tvojho PC)
#   B) Self-hosted runner  (automat po push, PC musí bežať)
#
# Secrets (rovnaké ako pre FileZilla):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_PLUGIN_DIR=/

name: Deploy to server (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install, build & deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PLUGIN_DIR: ${{ secrets.FTP_PLUGIN_DIR }}
        run: |
          npm ci
          npm run build
          node scripts/prepare-plugin-deploy.mjs
          node scripts/deploy-ftp.mjs
