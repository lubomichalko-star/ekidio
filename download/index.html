<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Stiahnuť ekidio</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light;
        --green: #5abb6f;
        --text: #0f172a;
        --muted: #64748b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: var(--text);
      }
      .card {
        width: min(420px, 100%);
        background: #fff;
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: 16px;
        padding: 28px 24px;
        text-align: center;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 14px;
        background: var(--green);
        color: #fff;
        text-decoration: none;
        font-weight: 800;
      }
      .meta {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ekidio</h1>
      <p>Stiahni si Android aplikáciu ekidio.</p>
      <a href="ekidio-1.9.3.apk" download="ekidio-1.9.3.apk">Stiahnuť appku</a>
      <p class="meta">Verzia 1.9.3 · Android APK</p>
    </div>
  </body>
</html>
